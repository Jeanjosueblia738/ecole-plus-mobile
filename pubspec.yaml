name: ecole_plus_mobile
description: Application mobile de gestion scolaire ECOLE+

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.6

  # State management
  flutter_riverpod: ^2.6.1

  # Firebase — Push Notifications
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3
  flutter_local_notifications: ^18.0.1

  # Stockage local
  sqflite: ^2.3.3
  sqflite_common_ffi: ^2.3.4
  shared_preferences: ^2.5.5

  # Connectivité
  connectivity_plus: ^7.1.1

  # Fichiers
  file_picker: ^8.0.0
  open_filex: ^4.4.0
  path_provider: ^2.1.2
  path: ^1.9.0

  # PDF
  pdf: ^3.11.1
  printing: ^5.13.1

  # Utilitaires
  intl: ^0.19.0
  dio: ^5.9.2
  flutter_secure_storage: ^10.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true